  <style>
    /* 全域樣式重設，營造專業素雅氛圍 */
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", "Helvetica", "Arial", "Noto Sans TC", sans-serif;
      background-color: #f4f6f8; /* 霧面灰白底色 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* 外層卡片容器 */
    .container {
      background-color: #ffffff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      width: 90%;          /* 行動裝置上預留左右邊距 */
      max-width: 480px;    /* 電腦版限制最大寬度，避免過寬 */
      text-align: center;
    }

    h2 {
      color: #1f3a52;      /* 深英倫藍 */
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* 表單佈局 */
    .form-group {
      display: flex;
      flex-direction: column; /* 預設在手機上垂直排列 */
      gap: 12px;
    }

    /* 輸入框樣式 */
    .input-box {
      padding: 14px 16px;
      border: 1px solid #dcdcdc;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s ease;
      color: #333333;
    }

    .input-box:focus {
      border-color: #1f3a52; /* 聚焦時變深藍 */
      box-shadow: 0 0 0 3px rgba(31, 58, 82, 0.1);
    }

    /* 按鈕樣式 */
    .submit-btn {
      padding: 14px 20px;
      background-color: #1f3a52; /* 專業深藍 */
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
    }

    .submit-btn:hover {
      background-color: #15293a; /* 滑過時加深 */
    }

    .submit-btn:active {
      transform: scale(0.98); /* 點擊時的下壓反饋 */
    }

    /* ── RWD 響應式優化 (針對平板與電腦螢幕) ── */
    @media (min-width: 576px) {
      .form-group {
        flex-direction: row; /* 在寬螢幕上橫向並排，更流暢 */
      }
      
      .input-box {
        flex: 1; /* 讓輸入框自動填滿剩餘空間 */
      }

      .submit-btn {
        width: auto; /* 按鈕寬度由文字決定 */
        min-width: 100px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>專線資料查詢</h2>
    <div class="form-group">
      <input type="text" class="input-box" id="userInput" placeholder="請輸入您的查詢代碼..." autocomplete="off">
      <button class="submit-btn" id="submitBtn">送出</button>
    </div>
  </div>
